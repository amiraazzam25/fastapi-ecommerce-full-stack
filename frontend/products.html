<!DOCTYPE html>
<html lang="en" dir="ltr" data-layout="topnav">

<head>
    <meta charset="utf-8" />
    <title>Products | HNU Store</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
    <script src="assets/js/config.js"></script>
    <link href="assets/css/vendor.min.css" rel="stylesheet" type="text/css" />
    <link href="assets/css/app.min.css" rel="stylesheet" type="text/css" id="app-style" />
    <link href="assets/css/icons.min.css" rel="stylesheet" type="text/css" />
    <link href="assets/css/shop.css" rel="stylesheet" type="text/css" />
</head>

<body class="store-page" data-store-page="products">
    <div class="wrapper">
        <header class="app-topbar">
            <div class="page-container topbar-menu">
                <a href="home" class="logo">
                    <span class="logo-light"><span class="logo-lg"><img src="assets/images/newlogo.png" alt="logo"></span></span>
                    <span class="logo-dark"><span class="logo-lg"><img src="assets/images/newlogo.png" alt="logo"></span></span>
                </a>
                <nav class="store-nav store-nav-search">
                    <form class="store-topbar-search" id="topbarSearchForm" autocomplete="off">
                        <i class="ti ti-search"></i>
                        <input id="topbarSearchInput" type="search" placeholder="Search products">
                        <div class="store-live-results d-none" id="topbarSearchResults"></div>
                    </form>
                </nav>
                <div class="d-flex align-items-center gap-2 store-actions">
                    <div class="topbar-item d-none d-sm-flex">
                        <button class="topbar-link btn btn-outline-primary btn-icon" id="light-dark-mode" type="button">
                            <i class="ti ti-moon fs-22"></i>
                        </button>
                    </div>
                    <div class="topbar-item">
                        <a class="topbar-link btn btn-outline-primary btn-icon position-relative" href="cart" aria-label="Cart">
                            <i class="ti ti-shopping-cart fs-22"></i>
                            <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill text-bg-danger store-cart-badge" id="cartCountBadge">0</span>
                        </a>
                    </div>
                    <div class="topbar-item">
                        <div class="dropdown">
                            <button class="topbar-link btn btn-outline-primary dropdown-toggle drop-arrow-none" data-bs-toggle="dropdown" data-bs-offset="0,22" type="button" aria-haspopup="false" aria-expanded="false">
                                <span class="d-flex align-items-center gap-2">
                                    <i class="ti ti-user-circle fs-22"></i>
                                    <span class="d-none d-md-block fw-semibold store-user-name">Customer</span>
                                </span>
                            </button>
                            <div class="dropdown-menu dropdown-menu-end">
                                <a href="profile" class="dropdown-item">
                                    <i class="ti ti-user-hexagon me-1 fs-17 align-middle"></i>
                                    <span class="align-middle">Profile</span>
                                </a>
                                <a href="orders" class="dropdown-item">
                                    <i class="ti ti-package me-1 fs-17 align-middle"></i>
                                    <span class="align-middle">Orders</span>
                                </a>
                                <div class="dropdown-divider"></div>
                                <a href="javascript:void(0);" class="dropdown-item text-danger" id="logoutBtn">
                                    <i class="ti ti-logout me-1 fs-17 align-middle"></i>
                                    <span class="align-middle">Logout</span>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <div class="page-content">
            <div class="page-container">
                <div class="page-title-head d-flex align-items-sm-center flex-sm-row flex-column gap-2">
                    <div class="flex-grow-1">
                        <h4 class="fs-18 text-uppercase fw-bold mb-0">All Products</h4>
                        <div class="text-muted">Browse the full catalog with filters and pagination.</div>
                    </div>
                </div>

                <div class="alert d-none store-alert" id="storeAlert" role="alert"></div>

                <div class="row g-3 mt-3">
                    <div class="col-xl-3">
                        <aside class="card store-products-filter">
                            <div class="card-header d-flex justify-content-between align-items-center">
                                <h4 class="header-title mb-0">Filters</h4>
                                <button class="btn btn-soft-danger btn-sm" id="resetProductsFiltersBtn" type="button">
                                    <i class="ti ti-refresh me-1"></i> Reset
                                </button>
                            </div>
                            <div class="card-body">
                                <div class="mb-3">
                                    <label class="form-label" for="productsTextFilter">Product name</label>
                                    <input class="form-control" id="productsTextFilter" type="search" placeholder="Search in catalog">
                                </div>

                                <div class="mb-3">
                                    <div class="form-label">Category</div>
                                    <div class="store-category-checks" id="productsCategoryFilters">
                                        <div class="text-muted small">Loading categories...</div>
                                    </div>
                                </div>

                                <div class="row g-2 mb-3">
                                    <div class="col-6">
                                        <label class="form-label" for="productsMinPrice">From</label>
                                        <input class="form-control" id="productsMinPrice" type="number" min="0" step="0.01" placeholder="0">
                                    </div>
                                    <div class="col-6">
                                        <label class="form-label" for="productsMaxPrice">To</label>
                                        <input class="form-control" id="productsMaxPrice" type="number" min="0" step="0.01" placeholder="999">
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label" for="productsSort">Sort</label>
                                    <select class="form-select" id="productsSort">
                                        <option value="featured">Featured</option>
                                        <option value="price-asc">Lowest Price</option>
                                        <option value="price-desc">Highest Price</option>
                                        <option value="name-asc">Name A-Z</option>
                                    </select>
                                </div>

                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox" id="productsInStockOnly">
                                    <label class="form-check-label" for="productsInStockOnly">In stock only</label>
                                </div>
                            </div>
                        </aside>
                    </div>

                    <div class="col-xl-9">
                        <section class="card">
                            <div class="card-header store-products-toolbar">
                                <div>
                                    <h4 class="header-title mb-1">Products</h4>
                                    <div class="text-muted small" id="productsResultInfo">Loading products...</div>
                                </div>
                                <div class="d-flex align-items-center gap-2">
                                    <label class="form-label mb-0" for="productsPerPage">Show</label>
                                    <select class="form-select form-select-sm store-per-page-select" id="productsPerPage">
                                        <option value="20">20</option>
                                        <option value="50">50</option>
                                        <option value="70">70</option>
                                    </select>
                                </div>
                            </div>
                            <div class="card-body">
                                <div class="row row-cols-xxl-4 row-cols-lg-3 row-cols-md-2 row-cols-1 g-3" id="productsGrid">
                                    <div class="col-12">
                                        <div class="card store-empty d-flex align-items-center justify-content-center">
                                            <div class="text-center text-muted">Loading products...</div>
                                        </div>
                                    </div>
                                </div>

                                <div class="store-products-footer">
                                    <div class="fw-semibold" id="productsPageInfo">Page 1</div>
                                    <div class="store-products-pagination" id="productsPagination"></div>
                                </div>
                            </div>
                        </section>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="productDetailsModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-2 border-dark">
                <div class="modal-header border-bottom border-2 border-dark">
                    <h5 class="modal-title" id="productDetailsTitle">Product</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="productDetailsBody"></div>
                <div class="modal-footer border-top border-2 border-dark">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary" id="productDetailsAddBtn"><i class="ti ti-shopping-cart me-1"></i> Add to Cart</button>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/vendor.min.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/pages/shop-api.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en" dir="ltr" data-layout="topnav">

<head>
    <meta charset="utf-8" />
    <title>Search | HNU Store</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
    <script src="assets/js/config.js"></script>
    <link href="assets/css/vendor.min.css" rel="stylesheet" type="text/css" />
    <link href="assets/css/app.min.css" rel="stylesheet" type="text/css" id="app-style" />
    <link href="assets/css/icons.min.css" rel="stylesheet" type="text/css" />
    <link href="assets/css/shop.css" rel="stylesheet" type="text/css" />
</head>

<body class="store-page" data-store-page="search">
    <div class="wrapper">
        <header class="app-topbar">
            <div class="page-container topbar-menu">
                <a href="home" class="logo">
                    <span class="logo-light"><span class="logo-lg"><img src="assets/images/newlogo.png" alt="logo"></span></span>
                    <span class="logo-dark"><span class="logo-lg"><img src="assets/images/newlogo.png" alt="logo"></span></span>
                </a>
                <nav class="store-nav store-nav-search">
                    <form class="store-topbar-search" id="topbarSearchForm" autocomplete="off">
                        <i class="ti ti-search"></i>
                        <input id="topbarSearchInput" type="search" placeholder="Search products">
                        <div class="store-live-results d-none" id="topbarSearchResults"></div>
                    </form>
                </nav>
                <div class="d-flex align-items-center gap-2 store-actions">
                    <div class="topbar-item d-none d-sm-flex">
                        <button class="topbar-link btn btn-outline-primary btn-icon" id="light-dark-mode" type="button">
                            <i class="ti ti-moon fs-22"></i>
                        </button>
                    </div>
                    <div class="topbar-item">
                        <a class="topbar-link btn btn-outline-primary btn-icon position-relative" href="cart" aria-label="Cart">
                            <i class="ti ti-shopping-cart fs-22"></i>
                            <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill text-bg-danger store-cart-badge" id="cartCountBadge">0</span>
                        </a>
                    </div>
                    <div class="topbar-item">
                        <div class="dropdown">
                            <button class="topbar-link btn btn-outline-primary dropdown-toggle drop-arrow-none" data-bs-toggle="dropdown" data-bs-offset="0,22" type="button" aria-haspopup="false" aria-expanded="false">
                                <span class="d-flex align-items-center gap-2">
                                    <i class="ti ti-user-circle fs-22"></i>
                                    <span class="d-none d-md-block fw-semibold store-user-name">Customer</span>
                                </span>
                            </button>
                            <div class="dropdown-menu dropdown-menu-end">
                                <a href="profile" class="dropdown-item">
                                    <i class="ti ti-user-hexagon me-1 fs-17 align-middle"></i>
                                    <span class="align-middle">Profile</span>
                                </a>
                                <a href="orders" class="dropdown-item">
                                    <i class="ti ti-package me-1 fs-17 align-middle"></i>
                                    <span class="align-middle">Orders</span>
                                </a>
                                <div class="dropdown-divider"></div>
                                <a href="javascript:void(0);" class="dropdown-item text-danger" id="logoutBtn">
                                    <i class="ti ti-logout me-1 fs-17 align-middle"></i>
                                    <span class="align-middle">Logout</span>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <div class="page-content">
            <div class="page-container">
                <div class="page-title-head d-flex align-items-sm-center flex-sm-row flex-column gap-2">
                    <div class="flex-grow-1">
                        <h4 class="fs-18 text-uppercase fw-bold mb-0">Search Products</h4>
                        <div class="text-muted">Find products by name.</div>
                    </div>
                </div>

                <div class="alert d-none store-alert" id="storeAlert" role="alert"></div>

                <div class="card mt-3">
                    <div class="card-body">
                        <form class="row g-2 align-items-end store-search-form" id="searchForm">
                            <div class="col-xl-8">
                                <label class="form-label" for="searchInput">Product Name</label>
                                <input class="form-control store-search-input" id="searchInput" type="search" placeholder="Search products">
                            </div>
                            <div class="col-xl-2">
                                <label class="form-label" for="searchCategoryFilter">Category</label>
                                <select class="form-select" id="searchCategoryFilter">
                                    <option value="">All Categories</option>
                                </select>
                            </div>
                            <div class="col-xl-1">
                                <div class="form-check form-switch mb-2">
                                    <input class="form-check-input" type="checkbox" id="searchHideOutOfStock">
                                    <label class="form-check-label" for="searchHideOutOfStock">In stock</label>
                                </div>
                            </div>
                            <div class="col-xl-1 d-grid">
                                <button class="btn btn-primary" type="submit"><i class="ti ti-search"></i></button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="row row-cols-xxl-4 row-cols-xl-3 row-cols-md-2 row-cols-1 g-3 mt-1" id="productsGrid"></div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="productDetailsModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-2 border-dark">
                <div class="modal-header border-bottom border-2 border-dark">
                    <h5 class="modal-title" id="productDetailsTitle">Product</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="productDetailsBody"></div>
                <div class="modal-footer border-top border-2 border-dark">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary" id="productDetailsAddBtn"><i class="ti ti-shopping-cart me-1"></i> Add to Cart</button>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/vendor.min.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/pages/shop-api.js"></script>
</body>

</html>
